<input type="text" id="userInput" placeholder="Command NEXUS..." autocomplete="off">

<script>
    const API_KEY = "AIzaSyCRt0MNX7qoLh9N3nS1BPrmMXdZ7HBTcXY";
    const inputField = document.getElementById('userInput');

    // Use 'keydown' or a form listener instead of 'onkeypress'
    inputField.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault(); // Stop the page from reloading
            const val = this.value.trim();
            if (val) {
                handleCommand(val);
                this.value = ''; // Clear the box
            }
        }
    });

    async function handleCommand(userMsg) {
        updateLog("USER", userMsg);
        updateLog("SYSTEM", "Querying Gemini Brain...");

        try {
            // Using 1.5-pro for maximum stability in 2026
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${API_KEY}`;
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: userMsg }] }] })
            });

            const data = await response.json();
            
            if (data.error) {
                updateLog("ERROR", data.error.message);
                return;
            }

            const res = data.candidates[0].content.parts[0].text;
            updateLog("NEXUS", res);

            if (typeof mentra !== 'undefined') {
                mentra.audio.speak(res);
            }
        } catch (err) {
            updateLog("ERROR", "Brain timeout. Check internet.");
        }
    }

    function updateLog(src, msg) {
        const term = document.getElementById('terminal');
        term.innerHTML += `<div class="log"><strong>[${src}]</strong> ${msg}</div>`;
        term.scrollTop = term.scrollHeight;
    }
</script>

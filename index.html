<script>
    // YOUR VERIFIED API KEY
    const API_KEY = "AIzaSyCRt0MNX7qoLh9N3nS1BPrmMXdZ7HBTcXY";
    const term = document.getElementById('terminal');
    const input = document.getElementById('userInput');

    function updateLog(src, msg) {
        const div = document.createElement('div');
        div.className = 'log';
        div.innerHTML = `<strong>[${src}]</strong> ${msg}`;
        term.appendChild(div);
        term.scrollTop = term.scrollHeight;
    }

    async function runCommand() {
        const val = input.value.trim();
        if (!val) return;

        updateLog("USER", val);
        input.value = ''; 
        updateLog("SYSTEM", "Querying Gemini 3.1 Pro...");

        try {
            // UPDATED 2026 ENDPOINT: Using the specific stable model string
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;
            
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
            });

            const data = await response.json();
            
            if (data.error) {
                // This will tell us if it's an API Key error or a server error
                updateLog("ERROR", `${data.error.code}: ${data.error.message}`);
            } else if (data.candidates && data.candidates[0].content) {
                const res = data.candidates[0].content.parts[0].text;
                updateLog("NEXUS", res);
                if (typeof mentra !== 'undefined') mentra.audio.speak(res);
            } else {
                updateLog("ERROR", "Empty response from Brain. Try again.");
            }
        } catch (err) {
            updateLog("ERROR", "Network failure. Check your Fold 7 internet.");
        }
    }

    // Physical and Virtual Enter detection
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            runCommand();
        }
    });
</script>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>NEXUS</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; padding: 10px; }
        #term { height: 70vh; overflow-y: auto; border: 1px solid #00ff41; padding: 10px; background: #000d00; margin-bottom: 10px; }
        .row { display: flex; gap: 5px; }
        input { flex: 1; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; font-size: 16px; outline: none; }
        button { background: #00ff41; color: #000; border: none; padding: 10px; font-weight: bold; }
        .log { margin-bottom: 8px; }
    </style>
</head>
<body>
    <div style="font-size: 0.8em; margin-bottom: 5px;">NEXUS_v3.1 | STABLE_BUILD</div>
    <div id="term">READY...</div>
    <div class="row">
        <input type="text" id="in" placeholder="Type here..." autocomplete="off">
        <button onclick="run()">SEND</button>
    </div>

    <script>
        const KEY = "AIzaSyCRt0MNX7qoLh9N3nS1BPrmMXdZ7HBTcXY";
        const box = document.getElementById('term');
        const ui = document.getElementById('in');

        function print(s, m) {
            box.innerHTML += `<div class="log"><strong>[${s}]</strong> ${m}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        async function run() {
            const txt = ui.value.trim();
            if (!txt) return;

            print("USER", txt);
            ui.value = "";
            print("SYS", "Querying Brain...");

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: txt }] }] })
                });

                const data = await res.json();
                if (data.error) {
                    print("ERR", data.error.message);
                } else {
                    print("NEXUS", data.candidates[0].content.parts[0].text);
                }
            } catch (e) {
                print("ERR", "Network Failure");
            }
        }

        ui.addEventListener('keydown', (e) => { if (e.key === 'Enter') run(); });
    </script>
</body>
</html>

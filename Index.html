<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS SOVEREIGN</title>
    <script src="https://cdn.jsdelivr.net/npm/@mentra/sdk@latest/dist/index.bundle.js"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; padding: 20px; }
        #terminal { height: 70vh; overflow-y: auto; border: 1px solid #00ff41; padding: 15px; margin-bottom: 15px; background: rgba(0,20,0,0.9); }
        input { width: 100%; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; font-size: 1.1em; outline: none; box-sizing: border-box; }
        .log { margin-bottom: 8px; border-left: 2px solid #008f11; padding-left: 10px; }
    </style>
</head>
<body>
    <div style="font-size: 0.8em; color: #008f11; border-bottom: 1px solid #008f11; padding-bottom: 5px; margin-bottom: 10px;">
        NEXUS_v3.1 | BRAIN: GEMINI_PRO_3.1 | HARDWARE: MENTRA_LIVE
    </div>
    <div id="terminal">[SYSTEM READY] Double-tap glasses to capture vision...</div>
    <input type="text" id="userInput" placeholder="Command NEXUS..." onkeypress="handleKey(event)">

    <script>
        // REPLACE THIS WITH YOUR KEY FROM aistudio.google.com
        const API_KEY = "AIzaSyCRt0MNX7qoLh9N3nS1BPrmMXdZ7HBTcXY";

        async function nexusBrain(text, base64Image = null) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro:generateContent?key=${API_KEY}`;
            const parts = [{ text: text }];
            if (base64Image) parts.push({ inline_data: { mime_type: "image/jpeg", data: base64Image } });

            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: parts }] })
            });
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        if (typeof mentra !== 'undefined') {
            mentra.on('intent', async (event) => {
                if (event.type === 'LOOK_AT_THIS') {
                    updateLog("ACTION", "Capturing Mentra HD frame...");
                    const photo = await mentra.camera.takePhoto({ quality: 'hd' });
                    const res = await nexusBrain("Identify HVAC components or analyze body language.", photo.base64);
                    updateLog("GEMINI", res);
                    mentra.audio.speak(res);
                }
            });
        }

        function updateLog(src, msg) {
            const term = document.getElementById('terminal');
            term.innerHTML += `<div class="log"><strong>[${src}]</strong> ${msg}</div>`;
            term.scrollTop = term.scrollHeight;
        }

        function handleKey(e) {
            if (e.key === 'Enter' && e.target.value) {
                updateLog("USER", e.target.value);
                nexusBrain(e.target.value).then(res => updateLog("NEXUS", res));
                e.target.value = '';
            }
        }
    </script>
</body>
</html>
